[pytest]
# Pytest 설정 파일

# 테스트 디렉토리
testpaths = tests

# 테스트 파일 패턴
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 기본 옵션
addopts =
    -v
    --tb=short
    --strict-markers

# 마커 정의
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests

# 경고 필터
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# 최소 pytest 버전
minversion = 7.0

# 로그 설정
log_cli = false
log_cli_level = INFO

# 타임아웃 (pytest-timeout 플러그인 필요)
# timeout = 300
