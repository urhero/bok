name: pytest

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install system deps
        run: sudo apt-get install -y unixodbc-dev
      - name: Install Python deps
        run: pip install pandas numpy scipy pyarrow python-dotenv rich pyodbc sqlalchemy pytest pytest-cov pytest-xdist
      - name: Run unit tests
        run: pytest tests/test_unit/ -v --tb=short --cov=service --cov-report=term-missing
